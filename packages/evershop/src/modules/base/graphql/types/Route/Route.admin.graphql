"""
Represents a route in the system
"""
type Route {
  id: String!
  isApi: Boolean!
  isAdmin: Boolean!
  name: String!
  path: String!
  methods: [String!]!
  """
  True when the route opts into page-builder editing via
  `"editable": true` in its `route.json`. Picker / page-switcher use
  this to surface a curated list of editable routes. Mirrors the
  Area-level `editableInPageBuilder` flag in naming.
  """
  editableInPageBuilder: Boolean!
  """
  Populated for routes whose URL pattern resolves to a single entity
  (e.g. an individual CMS page). Null for collection-style routes
  (product list, category page) where the URL serves many entities.
  """
  assignedEntity: AssignedEntity
}

"""
A specific entity bound to a route, used by the page builder to
distinguish entity-level edits (this specific CMS page) from
route-level edits (all pages on this route).
"""
type AssignedEntity {
  urn: String!
  label: String
}

extend type Query {
  routes: [Route!]!
  route(id: String!): Route
}
