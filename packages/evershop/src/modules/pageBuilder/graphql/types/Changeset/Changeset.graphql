"""
A page-builder editing session. Holds an ordered list of operations on
widget instances and placements. May be published (one-shot mutation of
source tables) or saved as a rollout_plan (overlay during a window).
"""
type Changeset {
  changesetId: Int!
  uuid: String!
  name: String!
  token: String!
  publishedAt: DateTime
  createdBy: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  operations: [ChangesetOperation!]!
  """
  Denormalized "highest applied op anywhere in the changeset". For the
  authoritative per-route apply state see `routeCursors`. Kept for back-compat
  with consumers that previously used it as a global cursor.
  """
  currentChange: Int
  """
  Per-route undo/redo cursors: { [route]: highest_applied_change_order }.
  An op is applied iff `op.change_order <= routeCursors[op.route]` (default 0
  when absent). Each route is independent — undoing on homepage doesn't
  affect cart's apply window. See spec § 5.1 / § 5.4.
  """
  routeCursors: JSON!
  """
  Whether there's an op on this route that's currently in the applied
  region — i.e. an Undo on this route would have an effect.
  """
  canUndo(route: String!): Boolean!
  """
  Whether there's an op on this route in the redo stack — i.e. a Redo on
  this route would have an effect.
  """
  canRedo(route: String!): Boolean!
  """
  Count of ops on a given route in this changeset (regardless of whether
  they're in the applied region or the redo stack). Powers the per-route
  op-count breakdown in the Discard confirmation dialog.
  """
  operationCountForRoute(route: String!): Int!
  """
  Per-route op counts across the whole changeset:
    [{ route: "homepage", count: 5 }, { route: "cart", count: 2 }]
  """
  operationCountsByRoute: [RouteOperationCount!]!
  rolloutPlan: RolloutPlan
}

"""
A single (route, count) entry used by `Changeset.operationCountsByRoute`.
"""
type RouteOperationCount {
  route: String!
  count: Int!
}

extend type Query {
  changeset(id: Int, uuid: String, token: String): Changeset
  changesets(filters: [FilterInput]): ChangesetCollection
}

type ChangesetCollection {
  items: [Changeset]
  currentPage: Int!
  total: Int!
  currentFilters: [Filter]
}
